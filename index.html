<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>仕事できるようになるアプリ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .app { width: 100%; max-width: 400px; min-height: 100vh; background: white; display: flex; flex-direction: column; position: relative; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }
    .header { padding: 16px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; }
    .header h2 { font-size: 16px; font-weight: 500; flex: 1; }
    .btn-back { background: none; border: none; cursor: pointer; font-size: 20px; color: #888; padding: 4px; }
    .bottom-nav { border-top: 1px solid #e5e5e5; display: flex; }
    .nav-btn { flex: 1; padding: 12px 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #bbb; font-size: 11px; }
    .nav-btn.active { color: #222; }
    .nav-btn i { font-size: 20px; }
    .home-content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .section-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .section-box { background: #f9f9f9; border-radius: 8px; padding: 12px; border: 1px solid #e5e5e5; min-height: 48px; font-size: 13px; color: #333; }
    .section-box .item-row { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; }
    .section-box .item-row:not(:last-child) { border-bottom: 1px solid #eee; }
    .section-box .item-icon { flex-shrink: 0; font-size: 14px; }
    .section-box .item-text { flex: 1; line-height: 1.5; }
    .start-btn { background: #222; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 500; cursor: pointer; width: 100%; margin-top: auto; }
    .start-btn:hover { background: #444; }
    .list-content { flex: 1; overflow-y: auto; }
    .list-item { padding: 14px 16px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: flex-start; gap: 12px; }
    .list-item-text { flex: 1; }
    .list-item-title { font-size: 14px; font-weight: 500; color: #222; margin-bottom: 3px; }
    .list-item-sub { font-size: 12px; color: #888; line-height: 1.5; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #ccc; flex-shrink: 0; padding: 2px; }
    .star-btn.active { color: #f59e0b; }
    .add-btn { margin: 16px; width: calc(100% - 32px); padding: 12px; background: none; border: 1px dashed #ddd; border-radius: 8px; color: #aaa; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .start-content { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; }
    .progress-bar { height: 4px; background: #f0f0f0; border-radius: 2px; margin-bottom: 20px; }
    .progress-fill { height: 100%; background: #222; border-radius: 2px; transition: width 0.3s; }
    .question-num { font-size: 12px; color: #888; margin-bottom: 8px; }
    .question-title { font-size: 16px; font-weight: 500; color: #222; margin-bottom: 6px; line-height: 1.5; }
    .question-sub { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 20px; }
    .comment-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #333; background: white; resize: none; height: 80px; margin-bottom: 16px; font-family: sans-serif; }
    .check-btns { display: flex; gap: 12px; margin-top: auto; }
    .check-btn { flex: 1; padding: 24px 14px; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }
    .check-btn .btn-icon { font-size: 40px; }
    .check-btn .btn-label { font-size: 14px; }
    .check-btn.maru { color: #059669; border-color: #059669; }
    .check-btn.batsu { color: #dc2626; border-color: #dc2626; }
    .check-btn:hover { opacity: 0.8; }
    .popup { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; display: none; z-index: 10; text-align: center; max-width: 300px; line-height: 1.5; }
    .popup.show { display: block; animation: popIn 3s forwards; }
    @keyframes popIn { 0%{opacity:0;transform:translateX(-50%) translateY(-8px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0} }
    .result-content { flex: 1; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .result-icon { font-size: 48px; }
    .result-title { font-size: 20px; font-weight: 500; color: #222; }
    .result-stats { display: flex; gap: 24px; margin: 8px 0; }
    .stat { text-align: center; }
    .stat-num { font-size: 24px; font-weight: 500; }
    .stat-label { font-size: 12px; color: #888; }
    .maru-color { color: #059669; }
    .batsu-color { color: #dc2626; }
    .home-btn { margin-top: 16px; padding: 12px 32px; background: #222; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
<div class="popup" id="popup"></div>
<div class="app">

  <div class="screen active" id="screen-home">
    <div class="header"><h2>仕事できるようになるアプリ</h2></div>
    <div class="home-content">
      <div>
        <div class="section-label">今日の目標</div>
        <div class="section-box" id="home-goal"><span style="color:#bbb">リスト画面で☆を設定してください</span></div>
      </div>
      <div>
        <div class="section-label">できる・達成</div>
        <div class="section-box" id="home-achieve"><span style="color:#bbb">1週間連続⭕の項目がここに表示されます</span></div>
      </div>
      <div>
        <div class="section-label">重点項目</div>
        <div class="section-box" id="home-weak"><span style="color:#bbb">❌が多い項目がここに表示されます</span></div>
      </div>
      <button class="start-btn" id="btn-start">START</button>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="home"><i class="ti ti-home"></i>ホーム</button>
      <button class="nav-btn" data-screen="calendar"><i class="ti ti-calendar"></i>カレンダー</button>
      <button class="nav-btn" data-screen="list"><i class="ti ti-list"></i>リスト</button>
      <button class="nav-btn" data-screen="notify"><i class="ti ti-bell"></i>通知</button>
    </nav>
  </div>

  <div class="screen" id="screen-list">
    <div class="header"><h2>リスト</h2></div>
    <div class="list-content" id="list-content"></div>
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="home"><i class="ti ti-home"></i>ホーム</button>
      <button class="nav-btn" data-screen="calendar"><i class="ti ti-calendar"></i>カレンダー</button>
      <button class="nav-btn active" data-screen="list"><i class="ti ti-list"></i>リスト</button>
      <button class="nav-btn" data-screen="notify"><i class="ti ti-bell"></i>通知</button>
    </nav>
  </div>

  <div class="screen" id="screen-start">
    <div class="header">
      <button class="btn-back" id="btn-back">←</button>
      <h2>振り返りチェック</h2>
    </div>
    <div class="start-content">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="question-num" id="q-num"></div>
      <div class="question-title" id="q-title"></div>
      <div class="question-sub" id="q-sub"></div>
      <textarea class="comment-input" id="q-comment" placeholder="コメントを入力（任意）"></textarea>
      <div class="check-btns">
        <button class="check-btn maru" id="btn-maru">
          <span class="btn-icon">⭕</span>
          <span class="btn-label">勝ち</span>
        </button>
        <button class="check-btn batsu" id="btn-batsu">
          <span class="btn-icon">❌</span>
          <span class="btn-label">次へ</span>
        </button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-content">
      <div class="result-icon">🏆</div>
      <div class="result-title">今日も終了！</div>
      <div class="result-stats">
        <div class="stat"><div class="stat-num maru-color" id="res-maru">0</div><div class="stat-label">⭕ 勝ち</div></div>
        <div class="stat"><div class="stat-num batsu-color" id="res-batsu">0</div><div class="stat-label">❌ 課題</div></div>
      </div>
      <div class="result-sub" id="res-msg"></div>
      <button class="home-btn" id="btn-home">ホームに戻る</button>
    </div>
  </div>

  <div class="screen" id="screen-calendar">
    <div class="header"><h2>カレンダー</h2></div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px;">フェーズ3で実装予定</div>
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="home"><i class="ti ti-home"></i>ホーム</button>
      <button class="nav-btn active" data-screen="calendar"><i class="ti ti-calendar"></i>カレンダー</button>
      <button class="nav-btn" data-screen="list"><i class="ti ti-list"></i>リスト</button>
      <button class="nav-btn" data-screen="notify"><i class="ti ti-bell"></i>通知</button>
    </nav>
  </div>

  <div class="screen" id="screen-notify">
    <div class="header"><h2>通知設定</h2></div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px;">フェーズ4で実装予定</div>
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="home"><i class="ti ti-home"></i>ホーム</button>
      <button class="nav-btn" data-screen="calendar"><i class="ti ti-calendar"></i>カレンダー</button>
      <button class="nav-btn" data-screen="list"><i class="ti ti-list"></i>リスト</button>
      <button class="nav-btn active" data-screen="notify"><i class="ti ti-bell"></i>通知</button>
    </nav>
  </div>

</div>
<script>
  let items = JSON.parse(localStorage.getItem('nippo-items') || 'null') || [
    {id:1,title:'今日の成果物（アウトプット）は何か言えますか？',sub:'',star:false},
    {id:2,title:'今日の仕事の経験は？',sub:'仕事の成長曲線は、経験回数と時間で決まる',star:false},
    {id:3,title:'GOALを決めて仕事に当たりましたか？',sub:'明確なゴール設定が大切。この仕事はどんな成果を得たいのかをしっかりと考える。',star:false},
    {id:4,title:'判断は後回しにせずその場で決めたか？',sub:'後回しにしても悪い結果が多い。その場で決める時はもっと真剣になる。',star:false},
    {id:5,title:'タスクを当日中に終えましたか？',sub:'今日やるべきことは明日に持ち越さない。',star:false},
    {id:6,title:'疑問や問題は自力で解決したか？',sub:'どうしてもわからない場合や時間がかかる時のみ聞く',star:false},
    {id:7,title:'作業時間を減らし、仕事時間を増やせましたか？',sub:'作業時間（人や機械に任せられる時間）／仕事時間（思考・判断の時間）',star:false},
    {id:8,title:'専門性を高める具体的な行動をとれたか？',sub:'',star:false},
    {id:9,title:'即レスができましたか？',sub:'6割成功でいいのでレスポンスを早くする。',star:false},
    {id:10,title:'一つの行動や作業を丁寧に行えたか？',sub:'マルチタスクをせずシングルタスクに徹する',star:false},
    {id:11,title:'会社に利益をもたらすことに徹することができますか？',sub:'',star:false},
  ];
  let records = JSON.parse(localStorage.getItem('nippo-records') || '{}');
  let nextId = items.length + 1;
  let currentQ = 0;
  let sessionResults = [];

  function save() {
    localStorage.setItem('nippo-items', JSON.stringify(items));
    localStorage.setItem('nippo-records', JSON.stringify(records));
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  function showPopup(msg) {
    const p = document.getElementById('popup');
    p.textContent = msg;
    p.classList.remove('show');
    void p.offsetWidth;
    p.classList.add('show');
    setTimeout(() => p.classList.remove('show'), 3000);
  }

  function renderSection(id, itemList, icon) {
    const el = document.getElementById(id);
    if (!itemList.length) return;
    el.innerHTML = itemList.map(i => `
      <div class="item-row">
        <span class="item-icon">${icon}</span>
        <span class="item-text">${i}</span>
      </div>
    `).join('');
  }

  function renderList() {
    const el = document.getElementById('list-content');
    el.innerHTML = items.map(item => `
      <div class="list-item">
        <div class="list-item-text">
          <div class="list-item-title">${item.title}</div>
          ${item.sub ? `<div class="list-item-sub">${item.sub}</div>` : ''}
        </div>
        <button class="star-btn ${item.star ? 'active' : ''}" data-id="${item.id}">${item.star ? '★' : '☆'}</button>
      </div>
    `).join('') + `<button class="add-btn" id="btn-add">＋ 項目を追加</button>`;

    el.querySelectorAll('.star-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        items = items.map(it => it.id === id ? {...it, star: !it.star} : it);
        save(); renderList(); updateHome();
      });
    });

    document.getElementById('btn-add').addEventListener('click', () => {
      const title = prompt('項目タイトルを入力してください');
      if (!title) { alert('未入力です'); return; }
      const sub = prompt('補足説明（任意）') || '';
      items.push({ id: nextId++, title, sub, star: false });
      save(); renderList();
    });
  }

  function updateHome() {
    const starred = items.filter(it => it.star);
    const goalEl = document.getElementById('home-goal');
    if (starred.length) {
      renderSection('home-goal', starred.map(i => i.title), '⭐');
    } else {
      goalEl.innerHTML = '<span style="color:#bbb">リスト画面で☆を設定してください</span>';
    }

    const today = new Date().toISOString().split('T')[0];
    const todayRec = records[today];
    if (todayRec) {
      const weak = items.filter(it => todayRec[it.id] === 'batsu');
      if (weak.length) {
        renderSection('home-weak', weak.map(i => i.title), '❌');
      } else {
        document.getElementById('home-weak').innerHTML = '<span style="color:#059669">課題項目なし！完璧です</span>';
      }
      const strong = items.filter(it => todayRec[it.id] === 'maru');
      if (strong.length) {
        renderSection('home-achieve', strong.map(i => i.title), '✅');
      }
    }
  }

  function startSession() {
    currentQ = 0;
    sessionResults = items.map(it => ({ id: it.id, result: null, comment: '' }));
    showQuestion();
    showScreen('start');
  }

  function showQuestion() {
    const item = items[currentQ];
    const pct = Math.round((currentQ / items.length) * 100);
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('q-num').textContent = (currentQ + 1) + ' / ' + items.length;
    document.getElementById('q-title').textContent = item.title;
    document.getElementById('q-sub').textContent = item.sub || '';
    document.getElementById('q-comment').value = '';
  }

  function answer(type) {
    const comment = document.getElementById('q-comment').value;
    sessionResults[currentQ].result = type;
    sessionResults[currentQ].comment = comment;
    if (type === 'maru') showPopup('勝ち・楽勝');
    else showPopup('勝者はすぐに前を向き、敗者はいつまでも横たわったままである');
    currentQ++;
    setTimeout(() => {
      if (currentQ < items.length) showQuestion();
      else finishSession();
    }, 1500);
  }

  function finishSession() {
    const today = new Date().toISOString().split('T')[0];
    const rec = {};
    sessionResults.forEach(r => { rec[r.id] = r.result; });
    records[today] = rec;
    save();
    const maru = sessionResults.filter(r => r.result === 'maru').length;
    const batsu = sessionResults.filter(r => r.result === 'batsu').length;
    document.getElementById('res-maru').textContent = maru;
    document.getElementById('res-batsu').textContent = batsu;
    document.getElementById('res-msg').textContent = maru >= items.length * 0.8 ? '素晴らしい！今日も完全勝利！' : maru >= items.length * 0.5 ? '良いペース！明日も続けよう！' : '課題を明日の糧に！';
    showScreen('result');
  }

  document.getElementById('btn-start').addEventListener('click', startSession);
  document.getElementById('btn-maru').addEventListener('click', () => answer('maru'));
  document.getElementById('btn-batsu').addEventListener('click', () => answer('batsu'));
  document.getElementById('btn-back').addEventListener('click', () => showScreen('home'));
  document.getElementById('btn-home').addEventListener('click', () => { updateHome(); showScreen('home'); });

  document.querySelectorAll('.nav-btn[data-screen]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.screen === 'list') renderList();
      if (btn.dataset.screen === 'home') updateHome();
      showScreen(btn.dataset.screen);
    });
  });

  renderList();
  updateHome();
</script>
</body>
</html>
